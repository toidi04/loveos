<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#8B2FD9">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta name="apple-mobile-web-app-title" content="Love OS">

    <title>Love OS 💜</title>

    <!-- فونت Vazirmatn توی CSS تعریف شده بود ولی هیچ‌وقت واقعا لود
         نمی‌شد (لینکش جا افتاده بود) - برای همین همیشه با فونت
         عمومی سیستم نمایش داده می‌شد، نه فونت قشنگ و برندی که
         قرار بود باشه. این‌جا واقعا لودش می‌کنیم. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="assets/icons/icon-192.png">

    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <link rel="stylesheet" href="css/main.css">

    <link rel="stylesheet" href="css/animation.css">

</head>

<body>

    <main id="app"></main>

    <!-- PixiJS: لود از CDN. سه منبع مختلف امتحان می‌شه (هرکدوم شکست
         بخوره - مسدود بودن، کند بودن، قطعی - بعدی رو امتحان می‌کنه)
         چون بعضی از دستگاه‌ها به بعضی از CDNها دسترسی ندارن. اگه در
         نهایت هیچ‌کدوم لود نشه، برنامه خودکار به نسخه‌ی CSS/DOM
         قبلی (fallback) برمی‌گرده - نه این‌که فریز کنه یا کاری از
         بازی‌ها کار نکنه (رجوع کن به runner.js / pixi-game.js).
         نکته: کاراکتر اصلی دیگه اصلا به PixiJS وابسته نیست - با
         تعویض فریم‌های عکس (sprite frames) ساده در userselect.js
         انیمیت می‌شه، پس هیچ‌وقت گیر بارگذاری این کتابخونه نمی‌افته -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js" onerror="this.dataset.failed=1"></script>
    <script>
        if (document.currentScript.previousElementSibling.dataset.failed){
            document.write('<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js" onerror="this.dataset.failed=1"><\/script>');
        }
    </script>
    <script>
        (function(){
            const prev = document.currentScript.previousElementSibling;
            if (typeof PIXI === "undefined" && prev && prev.dataset && prev.dataset.failed){
                document.write('<script src="https://unpkg.com/pixi.js@7.4.2/dist/pixi.min.js"><\/script>');
            }
        })();
    </script>

    <script src="js/config.js"></script>
    <script src="js/sfx.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/userselect.js"></script>
    <script src="js/relationship.js"></script>
    <script src="js/events.js"></script>
    <script src="js/pixi-background.js"></script>
    <script src="js/games.js"></script>

    <script src="js/intro.js"></script>
    <script src="js/gift.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/anniversary.js"></script>
    <script src="js/game.js"></script>
    <script src="js/pixi-game.js"></script>
    <script src="js/runner.js"></script>
    <script src="js/ending.js"></script>

</body>

</html>
